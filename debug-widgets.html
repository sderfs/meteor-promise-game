<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主界面调试工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #2C2C2E; display: flex; justify-content: center; align-items: flex-start; gap: 20px; padding: 20px; min-height: 100vh; flex-wrap: wrap; }

    .controls { width: 280px; background: #1C1C1E; border-radius: 16px; padding: 16px; color: #fff; flex-shrink: 0; max-height: 90vh; overflow-y: auto; }
    .controls h2 { font-size: 15px; margin-bottom: 12px; color: #86E0C1; }
    .ctrl { margin-bottom: 10px; }
    .ctrl label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 3px; }
    .ctrl label span { color: #fff; font-weight: 600; font-family: monospace; }
    input[type="range"] { width: 100%; accent-color: #86E0C1; height: 4px; }
    .code-box { background: #000; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; color: #86E0C1; white-space: pre-wrap; word-break: break-all; margin-top: 12px; max-height: 200px; overflow-y: auto; }

    .phone-wrap { flex-shrink: 0; }
    #phone-frame {
      width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px;
      box-shadow: 0 0 0 2px #333, 0 0 0 4px #1a1a1a, 0 20px 60px rgba(0,0,0,0.5);
    }
    #app {
      width: 100%; height: 100%; border-radius: 40px; overflow: hidden;
      display: flex; flex-direction: column; position: relative;
    }
    #wallpaper {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: url('assets/wallpaper.jpg') center center / cover no-repeat; z-index: 0;
    }

    #status-bar {
      height: 44px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; position: relative; z-index: 20; flex-shrink: 0;
    }
    .status-time { font-size: 15px; font-weight: 600; color: #3A3A3A; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    #search-bar { flex-shrink: 0; padding: 16px 16px 0; z-index: 20; position: relative; }
    .search-wrapper { position: relative; display: flex; align-items: center; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    #search-input {
      width: 100%; height: 40px; border-radius: 20px; border: none;
      padding: 0 16px 0 40px; font-size: 15px; outline: none; color: #3A3A3A;
      font-family: inherit; -webkit-appearance: none;
    }
    #search-input::placeholder { color: #8E8E93; }

    #main-scroll { flex: 1; overflow-y: auto; position: relative; z-index: 1; display: flex; flex-direction: column; }
    .widgets-area { padding: 16px 16px 0; position: relative; z-index: 1; }

    .widget {
      border-radius: 22px; padding: 16px; margin-bottom: 12px; cursor: pointer;
      transition: opacity 0.15s ease;
    }
    .widget-calendar { margin-bottom: 12px; }
    .calendar-row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .cal-date { font-size: 17px; font-weight: 600; color: #3A3A3A; }
    .cal-year { font-size: 13px; color: #8E8E93; }
    .calendar-row2 { margin-bottom: 10px; }
    .cal-weather { font-size: 15px; color: #3A3A3A; }
    .calendar-events { border-top: 0.5px solid rgba(0,0,0,0.08); padding-top: 8px; }
    .cal-event { font-size: 13px; color: #8E8E93; padding: 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .widget-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: stretch; }
    .widget-row .widget { flex: 1; margin-bottom: 0; padding: 14px; }

    .countdown-label { font-size: 11px; color: #8E8E93; margin-bottom: 6px; }
    .countdown-main { display: flex; align-items: baseline; gap: 4px; margin-bottom: 2px; }
    .countdown-num { font-size: 28px; font-weight: 700; color: #3A3A3A; line-height: 1; }
    .countdown-unit { font-size: 16px; color: #3A3A3A; }
    .countdown-sub { font-size: 11px; color: #8E8E93; margin-bottom: 8px; }
    .progress-bar { height: 5px; background: #E6E2D3; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #86E0C1; border-radius: 3px; width: 66%; }

    .memo-label { font-size: 11px; color: #8E8E93; margin-bottom: 8px; }
    .memo-item { font-size: 13px; color: #3A3A3A; padding: 3px 0; display: flex; align-items: center; gap: 8px; }
    .memo-dot { width: 3px; height: 14px; background: #86E0C1; border-radius: 2px; flex-shrink: 0; }
    .memo-secondary { font-size: 12px; color: #8E8E93; }

    .vertical-text-area { display: flex; justify-content: center; gap: 16px; padding: 4px 0 8px; }
    .vertical-text {
      writing-mode: horizontal-tb; color: rgba(255,255,255,0.6);
      font-family: "ZCOOL KuaiLe", "Ma Shan Zheng", "STKaiti", "KaiTi", cursive;
      letter-spacing: 2px; pointer-events: none; user-select: none; line-height: 1.2;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .app-icons-area { display: flex; align-items: center; justify-content: center; padding: 24px 0 8px; flex-shrink: 0; z-index: 1; position: relative; }
    .app-icon-row { display: flex; justify-content: center; gap: 24px; }
    .app-icon { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .icon-box { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
    .icon-label { font-size: 11px; color: #3A3A3A; text-align: center; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }
    .icon-wechat { background: #69a742; }
    .icon-qq { background: #5c67b0; }
    .icon-weibo { background: #be84f3; }
    .icon-footprint { background: #69a742; }

    #dock {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      border-radius: 28px; height: 82px; flex-shrink: 0; z-index: 10;
      padding-bottom: 0;
    }
    .dock-icon { display: flex; flex-direction: column; align-items: center; }
    .dock-icon-box { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .dock-icon-label { font-size: 10px; color: #3A3A3A; margin-top: 3px; text-align: center; }
    .icon-phone { background: #c5da5b; }
    .icon-sms { background: #8ccfd8; }
    .icon-album { background: #e8e55a; }
    .icon-deepseek { background: #5c67b0; }
  </style>
</head>
<body>

<div class="controls">
  <h2>🎛️ 主界面调试工具</h2>

  <div class="ctrl">
    <label>状态栏透明度 <span id="v1">0.35</span></label>
    <input type="range" id="r1" min="0" max="100" value="35" step="1">
  </div>
  <div class="ctrl">
    <label>搜索栏透明度 <span id="v2">0.40</span></label>
    <input type="range" id="r2" min="0" max="100" value="40" step="1">
  </div>
  <div class="ctrl">
    <label>小组件透明度 <span id="v3">0.35</span></label>
    <input type="range" id="r3" min="0" max="100" value="35" step="1">
  </div>
  <div class="ctrl">
    <label>小组件模糊度 <span id="v4">16px</span></label>
    <input type="range" id="r4" min="0" max="40" value="16" step="1">
  </div>
  <div class="ctrl">
    <label>Dock透明度 <span id="v5">0.45</span></label>
    <input type="range" id="r5" min="0" max="100" value="45" step="1">
  </div>
  <div class="ctrl">
    <label>Dock模糊度 <span id="v6">20px</span></label>
    <input type="range" id="r6" min="0" max="40" value="20" step="1">
  </div>
  <div class="ctrl">
    <label>暴富文字大小 <span id="v7">13px</span></label>
    <input type="range" id="r7" min="9" max="22" value="13" step="0.5">
  </div>
  <div class="ctrl">
    <label>Dock左右边距 <span id="v8">8px</span></label>
    <input type="range" id="r8" min="0" max="24" value="8" step="1">
  </div>
  <div class="ctrl">
    <label>Dock底部边距 <span id="v9">16px</span></label>
    <input type="range" id="r9" min="0" max="40" value="16" step="1">
  </div>

  <div class="code-box" id="code">/* 调整滑块后自动生成 */</div>
</div>

<div class="phone-wrap">
  <div id="phone-frame">
    <div id="app">
      <div id="wallpaper"></div>
      <header id="status-bar">
        <span class="status-time">10:30</span>
        <div class="status-icons">
          <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="#3A3A3A"/><rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="#3A3A3A"/><rect x="9" y="2" width="3" height="10" rx="0.5" fill="#3A3A3A"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#3A3A3A"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="#3A3A3A" transform="translate(0,-2)"/><path d="M4.5 8.5C5.5 7.2 6.7 6.5 8 6.5s2.5.7 3.5 2" stroke="#3A3A3A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M2 6c1.8-1.8 3.8-2.8 6-2.8s4.2 1 6 2.8" stroke="#3A3A3A" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="2.5" stroke="#3A3A3A" stroke-width="1" fill="none"/><rect x="24.5" y="3.5" width="2" height="5" rx="1" fill="#3A3A3A"/><rect x="2" y="2" width="19.5" height="9" rx="1.5" fill="#3A3A3A"/></svg>
        </div>
      </header>
      <div id="search-bar">
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.75" stroke="#8E8E93" stroke-width="2"/><line x1="13" y1="13" x2="18" y2="18" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" id="search-input" placeholder="搜索" autocomplete="off">
        </div>
      </div>
      <div id="main-scroll">
        <div class="widgets-area">
          <div class="widget widget-calendar">
            <div class="calendar-row1"><span class="cal-date">8月13日 周四</span><span class="cal-year">2026年</span></div>
            <div class="calendar-row2"><span class="cal-weather">28℃ 晴天</span></div>
            <div class="calendar-events">
              <div class="cal-event">8月20日 🎂 叶禾生日</div>
              <div class="cal-event">8月11日 📦 准备礼物</div>
            </div>
          </div>
          <div class="widget-row">
            <div class="widget widget-countdown">
              <div class="countdown-label">距离30岁环游世界</div>
              <div class="countdown-main"><span class="countdown-num">2924</span><span class="countdown-unit">天</span></div>
              <div class="countdown-sub">（8年）</div>
              <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
            <div class="widget widget-memo">
              <div class="memo-label">备忘录</div>
              <div class="memo-item"><span class="memo-dot"></span>📘 新手操作指南</div>
              <div class="memo-item memo-secondary">📝 随手记</div>
            </div>
          </div>
          <div class="vertical-text-area">
            <div class="vertical-text" id="vt1">努力赚钱</div>
            <div class="vertical-text" id="vt2">早日退休</div>
          </div>
        </div>
        <div class="app-icons-area">
          <div class="app-icon-row">
            <div class="app-icon"><div class="icon-box icon-wechat">💬</div><span class="icon-label">微信</span></div>
            <div class="app-icon"><div class="icon-box icon-qq">🤖</div><span class="icon-label">QQ</span></div>
            <div class="app-icon"><div class="icon-box icon-weibo">📰</div><span class="icon-label">微博</span></div>
            <div class="app-icon"><div class="icon-box icon-footprint">👣</div><span class="icon-label">足迹</span></div>
          </div>
        </div>
      </div>
      <div id="dock">
        <div class="dock-icon"><div class="dock-icon-box icon-phone">📞</div><span class="dock-icon-label">电话</span></div>
        <div class="dock-icon"><div class="dock-icon-box icon-sms">💬</div><span class="dock-icon-label">短信</span></div>
        <div class="dock-icon"><div class="dock-icon-box icon-album">🌙</div><span class="dock-icon-label">相册</span></div>
        <div class="dock-icon"><div class="dock-icon-box icon-deepseek">🤖</div><span class="dock-icon-label">DeepSeek</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  const ids = ['r1','r2','r3','r4','r5','r6','r7','r8','r9'];
  const vs = ['v1','v2','v3','v4','v5','v6','v7','v8','v9'];
  const statusBar = document.getElementById('status-bar');
  const searchInput = document.getElementById('search-input');
  const widgets = document.querySelectorAll('.widget');
  const dock = document.getElementById('dock');
  const vt1 = document.getElementById('vt1');
  const vt2 = document.getElementById('vt2');
  const codeEl = document.getElementById('code');

  function update() {
    const a = +document.getElementById('r1').value / 100;
    const b = +document.getElementById('r2').value / 100;
    const c = +document.getElementById('r3').value / 100;
    const d = +document.getElementById('r4').value;
    const e = +document.getElementById('r5').value / 100;
    const f = +document.getElementById('r6').value;
    const g = +document.getElementById('r7').value;
    const h = +document.getElementById('r8').value;
    const i = +document.getElementById('r9').value;

    vs.forEach((v, idx) => {
      const val = document.getElementById(ids[idx]).value;
      document.getElementById(v).textContent = idx < 6 ? (val / 100).toFixed(2) : val + (idx === 7 || idx === 8 ? 'px' : 'px');
    });

    statusBar.style.background = 'rgba(255,255,255,' + a + ')';
    searchInput.style.background = 'rgba(255,255,255,' + b + ')';
    searchInput.style.webkitBackdropFilter = 'blur(16px)';
    searchInput.style.backdropFilter = 'blur(16px)';

    widgets.forEach(w => {
      w.style.background = 'rgba(255,255,255,' + c + ')';
      w.style.webkitBackdropFilter = 'blur(' + d + 'px)';
      w.style.backdropFilter = 'blur(' + d + 'px)';
    });

    dock.style.background = 'rgba(255,255,255,' + e + ')';
    dock.style.webkitBackdropFilter = 'blur(' + f + 'px)';
    dock.style.backdropFilter = 'blur(' + f + 'px)';
    dock.style.margin = '0 ' + h + 'px ' + i + 'px';

    vt1.style.fontSize = g + 'px';
    vt2.style.fontSize = g + 'px';

    codeEl.textContent =
`/* 状态栏 */
#status-bar { background: rgba(255,255,255,${a.toFixed(2)}); }

/* 搜索栏 */
#search-input { background: rgba(255,255,255,${b.toFixed(2)}); }

/* 小组件 */
.widget { background: rgba(255,255,255,${c.toFixed(2)}); backdrop-filter: blur(${d}px); }

/* Dock */
#dock { background: rgba(255,255,255,${e.toFixed(2)}); backdrop-filter: blur(${f}px); margin: 0 ${h}px ${i}px; }

/* 暴富文字 */
.vertical-text { font-size: ${g}px; }`;
  }

  ids.forEach(id => document.getElementById(id).addEventListener('input', update));
  update();
</script>
</body>
</html>
